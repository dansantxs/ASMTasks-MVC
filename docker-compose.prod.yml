services:
  backend:
    ports:
      - "${PORT_BACKEND:-5000}:8080"
    restart: unless-stopped

  frontend:
    ports:
      - "${PORT_FRONTEND:-3000}:3000"
    restart: unless-stopped

  sqlserver:
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - asmtasks
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - cloudflare
